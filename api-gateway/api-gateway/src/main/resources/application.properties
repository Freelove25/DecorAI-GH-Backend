spring.application.name=api-gateway
server.port=8080

# ============================================================
# Spring Cloud Gateway Server WebMVC - ROUTES (FIXED PREFIX)
# ============================================================
# IMPORTANT: Use spring.cloud.gateway.server.webmvc.routes (not the old prefix)
spring.cloud.gateway.server.webmvc.routes[0].id=auth-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=shop-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8082
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/shops/**

spring.cloud.gateway.server.webmvc.routes[2].id=decorator-service
spring.cloud.gateway.server.webmvc.routes[2].uri=http://localhost:8083
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/decorators/**

spring.cloud.gateway.server.webmvc.routes[3].id=notification-service
spring.cloud.gateway.server.webmvc.routes[3].uri=http://localhost:8084
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/notifications/**

# ============================================================
# JWT Configuration
# ============================================================
jwt.secret=decoraigh-secret-key-2026

# ============================================================
# Optional: Helpful logging while debugging the gateway
# ============================================================
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web=DEBUG
