spring.application.name=api-gateway
server.port=8080

# Routes
spring.cloud.gateway.servlet.routes[0].id=auth-service
spring.cloud.gateway.servlet.routes[0].uri=http://localhost:8081
spring.cloud.gateway.servlet.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.servlet.routes[1].id=shop-service
spring.cloud.gateway.servlet.routes[1].uri=http://localhost:8082
spring.cloud.gateway.servlet.routes[1].predicates[0]=Path=/api/shops/**

spring.cloud.gateway.servlet.routes[2].id=decorator-service
spring.cloud.gateway.servlet.routes[2].uri=http://localhost:8083
spring.cloud.gateway.servlet.routes[2].predicates[0]=Path=/api/decorators/**

spring.cloud.gateway.servlet.routes[3].id=notification-service
spring.cloud.gateway.servlet.routes[3].uri=http://localhost:8084
spring.cloud.gateway.servlet.routes[3].predicates[0]=Path=/api/notifications/**

# JWT Secret
jwt.secret=decoraigh-secret-key-2026